env:
  kaggle_data_root: /kaggle/input
  local_data_root: ./data
  device: cuda

dataset:
  name: expandai-hiring-sewer
  train_imgs: train_images
  test_imgs: test_images
  train_csv: train.csv
  test_csv: test.csv
  num_classes: 19
  img_size: 224
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

training:
  batch_size: 16
  num_workers: 1
  epochs: 50
  learning_rate: 0.001
  weight_decay: 0.0001
