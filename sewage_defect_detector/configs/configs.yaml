env:
  kaggle_data_root: /kaggle/input
  local_data_root: ./data
  device: cuda

dataset:
  name: expandai-hiring-sewer
  train_imgs: train_images
  test_imgs: test_images
  train_csv: train.csv
  test_csv: test.csv
  num_classes: 19
  class_names: [VA,RB,OB,PF,DE,FS,IS,RO,IN,AF,BE,FO,GR,PH,PB,OS,OP,OK,ND]
  img_size: 224
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

training:
  batch_size: 64 
  num_workers: 2
  epochs: 15
  learning_rate: 5e-5
  weight_decay: 1e-4
