env:
  kaggle_data_root: /kaggle/input
  local_data_root: ./data
  device: cuda

dataset:
  name: expandai-hiring-sewer
  train_imgs: train_images
  test_imgs: test_images
  train_csv: train.csv
  test_csv: test.csv
  num_classes: 19
  class_names: [VA,RB,OB,PF,DE,FS,IS,RO,IN,AF,BE,FO,GR,PH,PB,OS,OP,OK,ND]
  CIW: [
    0.0310, 1.0, 0.5518, 0.2896, 0.1622, 0.6419, 
    0.1847, 0.3559, 0.3131, 0.0811, 0.2275, 0.2477,
    0.0901, 0.4167, 0.4167, 0.9009, 0.3829, 0.4396, 0.5
  ]
  img_size: 224
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

training:
  batch_size: 32 
  num_workers: 2
  epochs: 15
  learning_rate: 1e-4
  weight_decay: 1e-4
