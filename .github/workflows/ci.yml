jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sewage_defect_detector

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: sewage_defect_detector/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check . --select E,F,W --ignore E501

      - name: Run unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}/sewage_defect_detector
        run: pytest tests/ -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    defaults:
      run:
        working-directory: sewage_defect_detector

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t sewer-defects-detector:${{ github.sha }} .

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag sewer-defects-detector:${{ github.sha }} \
            ghcr.io/08-sreejith-95/sewer-defects-detector:latest
          docker push ghcr.io/08-sreejith-95/sewer-defects-detector:latest