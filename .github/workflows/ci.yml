name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sewage_defect_detector
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: sewage_defect_detector/requirements.txt
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Lint with ruff
        run: |
          ruff check . --select E,F,W --ignore E501,E402 --fix
          ruff check . --select E,F,W --ignore E501,E402
      
      - name: Run unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}/sewage_defect_detector
        run: pytest tests/ -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    defaults:
      run:
        working-directory: sewage_defect_detector
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./sewage_defect_detector
          file: ./sewage_defect_detector/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/08-sreejith-95/sewer-defects-detector:latest
            ghcr.io/08-sreejith-95/sewer-defects-detector:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/08-sreejith-95/sewer-defects-detector:buildcache
          cache-to: type=registry,ref=ghcr.io/08-sreejith-95/sewer-defects-detector:buildcache,mode=max